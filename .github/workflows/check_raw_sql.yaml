name: Raw SQL Guard
on:
  workflow_call:

jobs:
  check_raw_sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm install

      - name: Check for un-escaped raw SQL
        run: npx tsx scripts/check-raw-sql.ts
