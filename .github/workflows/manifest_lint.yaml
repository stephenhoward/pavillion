name: Manifest Lint
on:
  workflow_call:

jobs:
  manifest_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run bash tests
        run: bash bin/test/run.sh
      - name: Check manifest wiring
        run: bash bin/check-manifest.sh
      - name: Check notifications orphan refs
        # Guards the post-migration cleanup of the notifications domain — see
        # scripts/check-notification-orphan-refs.sh for what it catches.
        run: bash scripts/check-notification-orphan-refs.sh
