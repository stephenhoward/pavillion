# Pavillion Production Docker Compose Configuration
#
# This file defines the production deployment for Pavillion using Docker Compose.
#
# Usage:
#   Run ./bin/deploy.sh — the single entry point for install, upgrade, and
#   redeploy. It generates secrets, writes config/local.yaml, pulls the latest
#   images, runs migrations, and restarts the stack.
#
# For upgrades:
#   ./bin/deploy.sh
#
# The app container will automatically:
#   - Process Docker secrets from _FILE environment variables
#   - Wait for the database to be healthy
#   - Run any pending database migrations
#   - Start the application (web mode)
#
# The worker container will automatically:
#   - Process Docker secrets from _FILE environment variables
#   - Wait for the database and app to be healthy
#   - Start the background job processor (worker mode)
#
# Security Notes:
#   - When using Docker secrets (_FILE pattern), secret values are not visible
#     in `docker inspect` output
#   - Secrets are mounted as tmpfs inside the container at /run/secrets/
#   - Backward compatible: direct environment variables still work
#

services:
  # Pavillion application server (web mode)
  app:
    image: ghcr.io/stephenhoward/pavillion:${PAVILLION_IMAGE_TAG:-latest}
    container_name: pavillion-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DB_DIALECT=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-pavillion}
      - DB_USER=${DB_USER:-pavillion}
      # Direct environment variables (backward compatible)
      # These can be overridden by _FILE variants for enhanced security
      - DB_PASSWORD=${DB_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_HASH_SECRET=${EMAIL_HASH_SECRET:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - CALENDAR_IMPORT_HMAC_SECRET=${CALENDAR_IMPORT_HMAC_SECRET:-}
      # Docker secrets via _FILE pattern (recommended for production)
      # When set, the entrypoint reads secret from file and unsets _FILE variable
      - DB_PASSWORD_FILE=${DB_PASSWORD_FILE:-}
      - JWT_SECRET_FILE=${JWT_SECRET_FILE:-}
      - SESSION_SECRET_FILE=${SESSION_SECRET_FILE:-}
      - S3_SECRET_KEY_FILE=${S3_SECRET_KEY_FILE:-}
      - SMTP_PASSWORD_FILE=${SMTP_PASSWORD_FILE:-}
      - EMAIL_HASH_SECRET_FILE=${EMAIL_HASH_SECRET_FILE:-}
      - ENCRYPTION_KEY_FILE=${ENCRYPTION_KEY_FILE:-}
      - CALENDAR_IMPORT_HMAC_SECRET_FILE=${CALENDAR_IMPORT_HMAC_SECRET_FILE:-}
      # Optional S3 storage configuration
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
    volumes:
      # Mount local configuration for customization
      - ./config/local.yaml:/app/config/local.yaml:ro
      # Media storage volume (used if not using S3)
      - pavillion-media:/app/storage/media
    secrets:
      - db_password
      - jwt_secret
      - session_secret
      - encryption_key
    labels:
      - "autoheal=true"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # Pavillion worker container (worker mode)
  # Processes background jobs including database backups and monitoring
  worker:
    image: ghcr.io/stephenhoward/pavillion:${PAVILLION_IMAGE_TAG:-latest}
    container_name: pavillion-worker
    # Pass --worker flag to unified entrypoint
    command: ["--worker"]
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DB_DIALECT=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-pavillion}
      - DB_USER=${DB_USER:-pavillion}
      # Direct environment variables (backward compatible)
      - DB_PASSWORD=${DB_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_HASH_SECRET=${EMAIL_HASH_SECRET:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - CALENDAR_IMPORT_HMAC_SECRET=${CALENDAR_IMPORT_HMAC_SECRET:-}
      # Docker secrets via _FILE pattern (recommended for production)
      - DB_PASSWORD_FILE=${DB_PASSWORD_FILE:-}
      - JWT_SECRET_FILE=${JWT_SECRET_FILE:-}
      - SESSION_SECRET_FILE=${SESSION_SECRET_FILE:-}
      - SMTP_PASSWORD_FILE=${SMTP_PASSWORD_FILE:-}
      - EMAIL_HASH_SECRET_FILE=${EMAIL_HASH_SECRET_FILE:-}
      - ENCRYPTION_KEY_FILE=${ENCRYPTION_KEY_FILE:-}
      - CALENDAR_IMPORT_HMAC_SECRET_FILE=${CALENDAR_IMPORT_HMAC_SECRET_FILE:-}
      # Optional SMTP configuration for email alerts
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
    volumes:
      # Mount local configuration for customization
      - ./config/local.yaml:/app/config/local.yaml:ro
      # Mount backup volume for database backups
      - pavillion-backups:/backups
    secrets:
      - db_password
      - jwt_secret
      - session_secret
      - encryption_key
    labels:
      - "autoheal=true"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  # Docker socket proxy — the ONLY container that touches /var/run/docker.sock.
  # autoheal talks to this instead of the raw socket, so a compromise of the
  # third-party autoheal image cannot reach the full Docker control plane / host
  # root. The proxy is a Docker Official HAProxy image (better supply-chain
  # posture than a community proxy) running our own ruleset in
  # docker/socket-proxy.cfg, which allows only list + restart and denies
  # container create/start/exec and every other API section. Runs as root
  # because reading the root-owned socket requires it; the security boundary is
  # the HAProxy ruleset, not the proxy's uid. Pinned by digest so a tag re-push
  # cannot silently change the binary.
  socket-proxy:
    image: haproxy:3.2-alpine@sha256:4293e7e02c70e143778c86b4916f1b89e04f7a9221534b9abf6cace218c6b95f
    container_name: pavillion-socket-proxy
    user: "0:0"
    volumes:
      - ./docker/socket-proxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      # Read-only mount: the HAProxy ruleset enforces the API allowlist.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # HAProxy publishes the locked-down API as a unix socket here; autoheal
      # mounts the same volume to reach it. No TCP port is exposed.
      - autoheal-proxy-sock:/run/proxy
    # No host port published — reachable only via the shared socket volume.
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    # autoheal's entrypoint checks `[ -e "$DOCKER_SOCK" ]` at startup, so it must
    # not start until HAProxy has created the proxied socket. Gate it on this.
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/proxy/docker.sock"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Autoheal monitors container health and restarts unhealthy containers.
  # It reaches the Docker API through socket-proxy via a shared unix socket
  # rather than mounting /var/run/docker.sock directly. The socket path is a
  # real file, which satisfies autoheal's `[ -e "$DOCKER_SOCK" ]` startup guard
  # and selects its plain-HTTP unix-socket mode (its tcp:// mode would demand
  # client TLS certs the proxy does not serve). Pinned by digest so a tag
  # re-push of the third-party image cannot silently change the binary.
  autoheal:
    image: willfarrell/autoheal:1.2.0@sha256:31f580ef0279eaced5b38d631b08c474d70d8403c1c2fdd6ddcf2e879d5f3f7c
    container_name: pavillion-autoheal
    depends_on:
      # Wait for HAProxy to create the proxied socket before starting, or the
      # `[ -e "$DOCKER_SOCK" ]` guard fails and autoheal exits 127.
      socket-proxy:
        condition: service_healthy
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=120
      # Plain-HTTP unix socket served by the locked-down proxy.
      - DOCKER_SOCK=/run/proxy/docker.sock
    volumes:
      # Shared with socket-proxy; carries only the proxied API socket, never the
      # raw /var/run/docker.sock.
      - autoheal-proxy-sock:/run/proxy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Caddy reverse proxy with automatic HTTPS (standalone mode only)
  # Enable with: docker compose --profile standalone up -d
  # Or set COMPOSE_PROFILES=standalone in .env
  caddy:
    image: caddy:2-alpine
    container_name: pavillion-caddy
    profiles: ["standalone"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Operator-supplied per-instance snippets (gitignored). See caddy-extras.d/README.md.
      - ./caddy-extras.d:/etc/caddy/extras.d:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # PostgreSQL database
  db:
    image: postgres:17
    container_name: pavillion-db
    environment:
      - POSTGRES_DB=${DB_NAME:-pavillion}
      - POSTGRES_USER=${DB_USER:-pavillion}
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    volumes:
      - pavillion-db:/var/lib/postgresql/data
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pavillion} -d ${DB_NAME:-pavillion}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Uncomment to expose PostgreSQL port for external access (not recommended in production)
    # ports:
    #   - "5432:5432"

# Named volumes for persistent data
volumes:
  pavillion-db:
    name: pavillion-db
  pavillion-media:
    name: pavillion-media
  caddy-data:
    name: pavillion-caddy-data
  caddy-config:
    name: pavillion-caddy-config
  # Carries only the proxied Docker API socket that HAProxy publishes for
  # autoheal. The raw /var/run/docker.sock is never placed here.
  autoheal-proxy-sock:
    name: pavillion-autoheal-proxy-sock

  pavillion-backups:
    name: pavillion-backups
    # Operators can configure this volume to use different backing storage:
    # - NFS share: Use driver: local with type: nfs
    # - Cloud-backed filesystem: Use appropriate volume driver
    driver: local
    driver_opts:
      type: none
      device: /opt/pavillion/backups
      o: bind

# Docker secrets configuration
# These secrets are mounted as tmpfs at /run/secrets/ inside containers
# Secret files are created by running ./bin/deploy.sh
secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  session_secret:
    file: ./secrets/session_secret.txt
  encryption_key:
    file: ./secrets/encryption_key.txt
