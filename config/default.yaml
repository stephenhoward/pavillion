database:
  dialect: sqlite
  storage: ':memory:'   # SQLite only — production.yaml sets this to null when using PostgreSQL
  logging: false
host:
  port: 3000
domain: 'localhost:3000' # Domain for ActivityPub actor URIs
mail:
  transport: test
  from: noreply@example.com
  settings: {}
media:
  maxFileSize: 10485760  # 10MB in bytes
  allowedTypes:
    - 'image/png'
    - 'image/jpeg'
    - 'image/heic'
  allowedExtensions:
    - '.png'
    - '.jpg'
    - '.jpeg'
    - '.heic'
  storage:
    driver: 'local'
    basePath: './storage/media'

# JWT configuration for authentication tokens
# In production, JWT_SECRET must be set via environment variable
jwt:
  secret: 'development-only-jwt-secret-do-not-use-in-production'
  expiresIn: '7d'

# Session configuration
# In production, SESSION_SECRET must be set via environment variable
session:
  secret: 'development-only-session-secret-do-not-use-in-production'

# Calendar domain configuration
calendar:
  # Upper bound on how many event_instance rows a single event may persist.
  # Protects the lazy-materialization path (findOrMaterializeInstanceWithDetails)
  # from anonymous-write amplification via repeated miss probes across an
  # unbounded recurring schedule's occurrences.
  materializationCap: 1000
  # Calendar import configuration
  # In production, CALENDAR_IMPORT_HMAC_SECRET must be set via environment variable
  # Used to derive per-source DNS verification tokens.
  import:
    # HMAC secret for deriving DNS verification tokens.
    # Empty in default.yaml; development/test provide non-empty dev-only values.
    # Production startup refuses to boot with an empty or development-only value.
    hmacSecret: ''
    # DoH resolvers used for DNS ownership verification. Both must agree.
    dohResolvers:
      - 'https://1.1.1.1/dns-query'
      - 'https://8.8.8.8/dns-query'
    # Maximum number of import sources per calendar.
    maxSourcesPerCalendar: 10

# Funding domain configuration
# In production, ENCRYPTION_KEY must be set via environment variable
# Generate with: openssl rand -hex 32
funding:
  encryptionKey: '0a301f6ce8380d582acb2d5eb29109beeb722423261ae8bdad142210d89fe095'

# Moderation configuration
moderation:
  # HMAC secret for hashing reporter email addresses
  # In production, this MUST be changed to a unique, random secret
  emailHashSecret: 'development-only-email-hash-secret-do-not-use-in-production'
  # IP data retention policy (in days)
  retention:
    ipHash: 30  # Days to retain full IP hashes
    ipSubnet: 90  # Days to retain subnet information

# Rate limiting configuration
rateLimit:
  enabled: true
  store: memory
  passwordReset:
    byIp:
      windowMs: 900000  # 15 minutes in milliseconds
      max: 5  # 5 requests per IP per 15 minutes
    byEmail:
      windowMs: 3600000  # 1 hour in milliseconds
      max: 3  # 3 requests per email per hour
  login:
    byIp:
      windowMs: 900000  # 15 minutes in milliseconds
      max: 10  # 10 requests per IP per 15 minutes
    byEmail:
      windowMs: 3600000  # 1 hour in milliseconds
      max: 5  # 5 requests per email per hour
  activitypub:
    actor:
      windowMs: 60000  # 1 minute in milliseconds
      max: 60  # 60 requests per actor per minute
    calendar:
      windowMs: 60000  # 1 minute in milliseconds
      max: 120  # 120 requests per calendar per minute
  moderation:
    reportByIp:
      windowMs: 900000  # 15 minutes in milliseconds
      max: 10  # 10 report submissions per IP per 15 minutes
    verifyByIp:
      windowMs: 900000  # 15 minutes in milliseconds
      max: 20  # 20 verification requests per IP per 15 minutes
    byEmail:
      windowMs: 86400000  # 24 hours in milliseconds
      max: 3  # 3 verification emails per email per 24 hours
    byAccount:
      windowMs: 3600000  # 1 hour in milliseconds
      max: 20  # 20 report submissions per account per hour
  publicWidget:
    byIp:
      windowMs: 900000  # 15 minutes in milliseconds
      max: 300  # 300 requests per IP per 15 minutes (higher for embedded widgets)
  publicEventInstance:
    byIp:
      windowMs: 900000  # 15 minutes in milliseconds
      max: 120  # 120 requests per IP per 15 minutes (protects lazy instance materialization)
  widgetConfig:
    byAccount:
      windowMs: 900000  # 15 minutes in milliseconds
      max: 100  # 100 requests per account per 15 minutes
  calendarFundingPlan:
    byAccount:
      windowMs: 900000  # 15 minutes in milliseconds
      max: 30  # 30 requests per account per 15 minutes
  checkoutSession:
    byAccount:
      windowMs: 900000  # 15 minutes in milliseconds
      max: 10  # 10 requests per account per 15 minutes
  importSource:
    verifyBySource:
      windowMs: 3600000  # 1 hour in milliseconds
      max: 3  # 3 verify attempts per source per hour
    syncBySource:
      windowMs: 3600000  # 1 hour in milliseconds
      max: 4  # 4 sync attempts per source per hour

# Housekeeping configuration for automated server maintenance
housekeeping:
  enabled: true
  backup:
    schedule: '0 2 * * *'  # Daily at 2 AM
    retention:
      daily: 7
      weekly: 4
      monthly: 6
    path: '/backups'
    # Optional S3 upload configuration (future enhancement)
    # s3:
    #   enabled: false
    #   bucket: 'my-backups'
    #   endpoint: 'https://s3.amazonaws.com'
    #   region: 'us-east-1'
    #   accessKeyId: ''
    #   secretAccessKey: ''
  monitoring:
    disk:
      enabled: true
      warning_threshold: 80
      critical_threshold: 90
      check_interval: '0 * * * *'  # Hourly
  inbox:
    retentionDays: 30
    batchSize: 1000
    schedule: '0 5 * * *'  # Daily at 5 AM
