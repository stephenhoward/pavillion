# E2E Testing Configuration
# Inherits from default.yaml with test-specific overrides

# Use in-memory database for fast, isolated tests
database:
  dialect: sqlite
  storage: ':memory:'
  logging: false

# Test mail transport — must use 'testing' (not 'test') to match the
# transport factory in EmailService.createTransport()
mail:
  transport: testing
  from: test@pavillion.test

# Disable rate limiting for tests
rateLimit:
  enabled: false
